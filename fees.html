<!DOCTYPE html>
<html>
<head>
<title>Fee Payment</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#00c6ff,#0072ff);
}

/* HEADER */
.header{
  background:#111;
  color:white;
  padding:15px;
  text-align:center;
  font-size:24px;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  background:#1e1e2f;
  position:fixed;
  padding-top:20px;
}

.sidebar a{
  display:block;
  color:white;
  padding:12px;
  margin:8px;
  text-decoration:none;
  border-radius:6px;
}

.sidebar a:hover{
  background:#00c6ff;
}

/* MAIN */
.main{
  margin-left:230px;
  padding:20px;
  color:white;
}

/* CARD */
.card{
  background:white;
  color:black;
  padding:20px;
  border-radius:12px;
  width:400px;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* INPUT */
input,select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

/* BUTTON */
button{
  width:100%;
  padding:10px;
  background:#0072ff;
  color:white;
  border:none;
  border-radius:6px;
  font-size:16px;
}

button:hover{
  background:#00c6ff;
}

/* TABLE */
table{
  width:100%;
  margin-top:30px;
  border-collapse:collapse;
  background:white;
  color:black;
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:12px;
  border:1px solid #ddd;
  text-align:center;
}

th{
  background:#0072ff;
  color:white;
}

.paid{
  color:green;
  font-weight:bold;
}

.pending{
  color:red;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="header">
💰 Fee Management System
</div>

<div class="sidebar">
<a href="dashboard.html">🏠 Dashboard</a>
<a href="register.html">📝 Registration</a>
<a href="room.html">🛏 Room</a>
<a href="students.html">📋 Students</a>
<a href="fees.html">💰 Fees</a>
<a href="complaint.html">⚠ Complaint</a>
<a href="logout.html">🚪 Logout</a>
</div>

<div class="main">

<h2>Pay Hostel Fee</h2>

<div class="card">
<form onsubmit="return addFee()">

<input type="text" id="name" placeholder="Student Name" required>

<!-- 🔥 NEW: Room Type -->
<select id="room">
<option value="">Select Room Type</option>
<option value="Single">Single (₹3000)</option>
<option value="Double">Double (₹5000)</option>
<option value="Triple">Triple (₹7000)</option>
<option value="Deluxe">Deluxe (₹9000)</option>
</select>

<input type="number" id="amount" placeholder="Amount (₹)" required>

<select id="status">
<option>Paid</option>
<option>Pending</option>
</select>

<button type="submit">Submit Fee</button>

</form>
</div>

<h2>Fee Records</h2>

<table id="tbl">
<tr>
<th>Name</th>
<th>Room</th>
<th>Amount</th>
<th>Status</th>
</tr>

<tr>
<td>Rahul Sharma</td>
<td>Double</td>
<td>₹5000</td>
<td class="paid">Paid</td>
</tr>

<tr>
<td>Priya Patil</td>
<td>Single</td>
<td>₹3000</td>
<td class="pending">Pending</td>
</tr>

<tr>
<td>Amit Verma</td>
<td>Deluxe</td>
<td>₹9000</td>
<td class="paid">Paid</td>
</tr>

</table>

</div>

<script>
function addFee(){
  var name = document.getElementById("name").value;
  var amount = document.getElementById("amount").value;
  var status = document.getElementById("status").value;
  var room = document.getElementById("room").value;

  var table = document.getElementById("tbl");
  var row = table.insertRow();

  row.insertCell(0).innerHTML = name;
  row.insertCell(1).innerHTML = room;
  row.insertCell(2).innerHTML = "₹" + amount;

  if(status=="Paid"){
    row.insertCell(3).innerHTML = "<span class='paid'>Paid</span>";
  }else{
    row.insertCell(3).innerHTML = "<span class='pending'>Pending</span>";
  }

  alert("Fee Submitted Successfully!");

  return false;
}
</script>

</body>
</html>
