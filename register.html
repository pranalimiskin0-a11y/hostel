<!DOCTYPE html>
<html>
<head>
<title>Student Registration</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#36d1dc,#5b86e5);
}

/* HEADER */
.header{
  background:#111;
  color:white;
  padding:15px;
  text-align:center;
  font-size:24px;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  background:#1e1e2f;
  position:fixed;
  padding-top:20px;
}

.sidebar a{
  display:block;
  color:white;
  padding:12px;
  text-decoration:none;
  margin:8px;
  border-radius:6px;
  transition:0.3s;
}

.sidebar a:hover{
  background:#00c6ff;
  transform:scale(1.05);
}

/* MAIN */
.main{
  margin-left:230px;
  padding:20px;
}

/* FORM CARD */
.form-box{
  background:white;
  padding:25px;
  width:400px;
  border-radius:12px;
  box-shadow:0px 5px 15px rgba(0,0,0,0.2);
}

input,select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:1px solid #ccc;
  border-radius:5px;
}

/* BUTTON */
button{
  background:#5b86e5;
  color:white;
  border:none;
  padding:10px;
  width:100%;
  border-radius:6px;
  font-size:16px;
}

button:hover{
  background:#36d1dc;
}
</style>

</head>

<body>

<div class="header">
🏠 Hostel Management System - Registration
</div>

<div class="sidebar">
<a href="dashboard.html">🏠 Dashboard</a>
<a href="register.html">📝 Registration</a>
<a href="room.html">🛏 Room</a>
<a href="students.html">📋 Students</a>
<a href="fees.html">💰 Fees</a>
<a href="complaint.html">⚠ Complaint</a>
<a href="logout.html">🚪 Logout</a>
</div>

<div class="main">

<h2>Add New Student</h2>

<div class="form-box">

<form onsubmit="return goNextPage()">

<input type="text" placeholder="Full Name" required>
<input type="number" placeholder="Age" required>

<select required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input type="text" placeholder="Room Number">
<input type="text" placeholder="Mobile Number">
<input type="text" placeholder="Address">

<button type="submit">Register Student</button>
</form>

</div>

</div>

<script>
function goNextPage(){
  // 👉 Room allotment page ला redirect
  window.location.href = "room.html"; 
  
  return false;
}
</script>

</body>
</html>
