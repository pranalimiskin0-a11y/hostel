<!DOCTYPE html>
<html>
<head>
<title>Hostel Login</title>

<style>
body{
  margin:0;
  font-family:Arial;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url('https://images.unsplash.com/photo-1560448204-e02f11c3d0e2') no-repeat center center/cover;
  position:relative;
}

/* Blur overlay */
body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  backdrop-filter:blur(8px);
  background:rgba(0,0,0,0.4);
  z-index:0;
}

/* BOX */
.box{
  position:relative;
  background:white;
  padding:35px;
  width:340px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
  z-index:1;
}

h2{
  color:#0072ff;
  margin-bottom:10px;
}

p{
  color:#555;
  font-size:14px;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

/* BUTTON */
button{
  width:100%;
  padding:10px;
  background:#0072ff;
  color:white;
  border:none;
  border-radius:6px;
  font-size:16px;
}

button:hover{
  background:#00c6ff;
}

.error{
  color:red;
  font-size:14px;
}

</style>

</head>

<body>

<div class="box">

<h2>🏠 Hostel Login</h2>
<p>Welcome! Please login to continue</p>

<form onsubmit="return login()">

<input type="text" id="username" placeholder="Username" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Login</button>

<p class="error" id="error"></p>

</form>

</div>

<script>
function login(){
  var u=document.getElementById("username").value;
  var p=document.getElementById("password").value;

  if(u=="admin" && p=="1234"){
    window.location.href="dashboard.html";
    return false;
  }else{
    document.getElementById("error").innerHTML="Invalid Username or Password!";
    return false;
  }
}
</script>

</body>
</html>
